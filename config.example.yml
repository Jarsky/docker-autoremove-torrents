# Example config for autoremove-torrents
#
# Important for Docker users:
# - 127.0.0.1 inside the container means the container itself.
# - Replace the host below with the LAN IP, Docker DNS name, or host mapping
#   for your actual torrent client.

my_task:
  client: qbittorrent
  host: http://192.168.1.100:8080
  username: admin
  password: adminadmin

  strategies:
    ratio_and_time:
      categories:
        - IPT
      ratio: 1
      seeding_time: 1209600

    catch_all:
      all_categories: true
      excluded_categories:
        - IPT
      seeding_time: 259200

  delete_data: true
